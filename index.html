<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>BITCOIN DROPS</title>
<meta name="description" content="Bitcoin Drops - Click falling coins to mine Bitcoin!">
<script>
/* ── MRAID v2.0 Support ── */
var mraidReady=false;
var mraidAvailable=(typeof mraid!=='undefined');
function onMraidReady(){
  mraidReady=true;
  mraid.removeEventListener('ready',onMraidReady);
  mraid.addEventListener('viewableChange',function(viewable){
    if(!viewable){pauseGame();}else{if(gameStarted&&!gameOver)resumeGame();}
  });
}
if(mraidAvailable){
  if(mraid.getState()==='loading'){
    mraid.addEventListener('ready',onMraidReady);
  }else{
    onMraidReady();
  }
}
function exitToStore(){
  try{
    var ua=navigator.userAgent||navigator.vendor||window.opera;
    var isIOS=/iPad|iPhone|iPod|Macintosh/.test(ua)&&('ontouchend' in document);
    var storeUrl=isIOS
      ?'https://apps.apple.com/us/app/bitcoin-miner-idle-tycoon/id1413770650'
      :'https://play.google.com/store/apps/details?id=com.fumbgames.bitcoinminor&hl=en_GB';
    if(typeof FbPlayableAd!=='undefined'&&FbPlayableAd.onCTAClick){
      FbPlayableAd.onCTAClick();
    } else if(mraidAvailable&&mraidReady&&mraid.open){
      mraid.open(storeUrl);
    } else {
      window.open(storeUrl,'_blank');
    }
  }catch(e){console.log('CTA click',e)}
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100dvh;overflow:hidden}
body{
  background:#1a1a2e;
  display:flex;
  font-family:'Courier New',Courier,monospace;
  font-weight:bold;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  padding-bottom:env(safe-area-inset-bottom);
  overflow:hidden;
}

/* ── PORTRAIT: column layout (default) ── */
#wrapper{
  display:flex;flex-direction:column;
  width:100vw;height:100dvh;
  position:relative;
  overflow:hidden;
}
#bg-canvas{
  position:fixed;inset:0;z-index:0;
  width:100vw;height:100dvh;
  pointer-events:none;
}
#hud{
  flex-shrink:0;
  display:flex;align-items:flex-start;
  padding:1.5vh 2vw;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(4px);
  z-index:40;
  position:fixed;top:0;left:0;
  width:auto;
}
#hud-center{display:flex;flex-direction:column;align-items:flex-start;}
#rock-count{font-size:clamp(14px,2.5vh,24px);color:#f5f0e8;line-height:1}
#rock-count .danger{color:hsl(0,72%,51%)}
#rock-count .cap{font-size:clamp(10px,1.5vh,16px);opacity:0.6}
#score-display{font-size:clamp(8px,1.3vh,14px);color:hsl(45,80%,55%);margin-top:0.5vh;opacity:0.8}
#timer-display{font-size:clamp(10px,1.8vh,18px);color:hsl(0,85%,60%);margin-top:0.3vh;font-weight:bold}

/* ── Game Area ── */
#game-area{
  position:fixed;inset:0;overflow:hidden;cursor:default;z-index:1;
}
#coin-layer{position:absolute;inset:0}

/* ── Miner Panel (PORTRAIT: top-right corner) ── */
#miner-panel{
  position:fixed;top:20px;right:20px;bottom:auto;left:auto;
  display:flex;flex-direction:column;align-items:flex-end;
  padding:0;
  background:none;
  backdrop-filter:none;
  z-index:9999;gap:8px;
}
#miners-display{display:flex;flex-wrap:wrap;gap:4px;align-items:center;justify-content:flex-end}
.miner-icon{font-size:clamp(10px,1.8vh,18px);display:inline-block;animation:bounce 1.2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
#buttons-row{display:flex;flex-direction:column;align-items:center;gap:15px}

.shop-btn{
  background:none;border:none;padding:0;cursor:pointer;
  position:relative;transition:transform 0.08s;
  display:flex;flex-direction:column;align-items:center;
}
.shop-btn img{
  width:clamp(80px,18vw,160px);height:auto;
  pointer-events:none;display:block;
}
.shop-btn:active{transform:translateY(3px)}
.shop-btn:disabled{opacity:0.4;cursor:default;filter:saturate(0.5);transform:none}
.shop-btn .cost{
  display:block;
  font-family:'Courier New',monospace;font-weight:bold;
  font-size:clamp(8px,1.2vh,12px);
  opacity:0.85;margin-top:2px;
  text-shadow:none;
  color:#fffde0;
}

#miner-info{
  font-size:clamp(7px,1.1vh,11px);color:rgba(245,240,232,0.7);
  text-align:center;line-height:1.8;white-space:nowrap;
}

/* ── Coins ── */
.coin{position:absolute;cursor:pointer;transition:none}
.coin.removing{animation:puff 0.3s ease-out forwards;pointer-events:none}
.coin img{width:100%;height:100%;pointer-events:none}
@keyframes puff{
  0%{transform:scale(1);opacity:1}
  50%{transform:scale(1.5);opacity:0.5}
  100%{transform:scale(2);opacity:0}
}

/* ── LANDSCAPE ── */
@media(orientation:landscape){
  #wrapper{flex-direction:row}
  #hud{flex-direction:column;padding:2vh 1vw;width:auto;min-width:8vw;justify-content:flex-start}
  #hud-center{margin-top:1vh}
  #rock-count{font-size:clamp(14px,3vw,22px)}
  #rock-count .cap{font-size:clamp(9px,1.8vw,14px)}
  #score-display{font-size:clamp(8px,1.5vw,13px)}
  #miner-panel{
    position:fixed;top:20px;right:20px;bottom:auto;left:auto;
    transform:none;
    width:auto;height:auto;
    flex-direction:column;align-items:flex-end;justify-content:flex-start;
    padding:0;gap:15px;
    background:none;backdrop-filter:none;
  }
  #buttons-row{flex-direction:column;gap:15px;align-items:center}
  #miners-display{justify-content:flex-end}
  .shop-btn img{width:clamp(80px,14vw,160px)}
  .shop-btn .cost{font-size:clamp(7px,1.2vw,11px)}
  #miner-info{font-size:clamp(7px,1.3vw,11px)}
  .miner-icon{font-size:clamp(10px,2vw,16px)}
}

/* ── Tap to Start ── */
#tap-to-start{
  position:fixed;inset:0;z-index:60;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,30,80,0.85);cursor:pointer;
}
#tap-to-start h1{font-size:clamp(20px,5vmin,36px);color:hsl(45,80%,55%);margin-bottom:12px;text-shadow:2px 2px 8px rgba(0,0,0,0.6)}
#tap-to-start p{font-size:clamp(12px,3vmin,18px);color:#f5f0e8;opacity:0.7;animation:tapPulse 1.5s ease-in-out infinite}
@keyframes tapPulse{0%,100%{opacity:0.5}50%{opacity:1}}
#tap-to-start.hidden{display:none}

/* ── Game Over ── */
#game-over{
  position:fixed;inset:0;z-index:50;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.75);
}
#game-over.active{display:flex}
#game-over-inner{text-align:center;animation:gameOverIn 0.5s ease-out}
#game-over h1{font-size:clamp(24px,6vmin,42px);color:hsl(0,72%,51%);margin-bottom:8px;text-shadow:2px 2px 4px rgba(0,0,0,0.5)}
#game-over p{font-size:clamp(10px,2.5vmin,16px);color:#f5f0e8;opacity:0.8;margin-bottom:24px}
#download-btn{
  background:none;border:none;padding:0;cursor:pointer;
  animation:ctaPulse 1.5s ease-in-out infinite;
}
#download-btn img{
  width:clamp(180px,40vmin,320px);height:auto;
  pointer-events:none;display:block;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));
}
#download-btn:active{transform:scale(0.95)}
@keyframes ctaPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.08)}
}
@keyframes gameOverIn{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* ── Persistent Download Button ── */
#persistent-download-btn{
  position:fixed !important;
  top:20px !important;
  left:50% !important;
  right:auto !important;
  transform:translateX(-50%) !important;
  margin:0 !important;
  padding:0 !important;
  width:140px !important;
  z-index:10001;
  background:none;border:none;cursor:pointer;
  animation:ctaPulse 1.5s ease-in-out infinite;
}
#persistent-download-btn img{
  width:100% !important;height:auto;
  pointer-events:none;display:block;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));
}
#persistent-download-btn:active{transform:translateX(-50%) scale(0.95) !important}
#persistent-download-btn.hidden{display:none !important}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="wrapper">
  <div id="hud">
    <div id="hud-center">
      <p id="rock-count"><span id="active-count">0</span><span class="cap"> / 25</span></p>
      <p id="score-display">Score: 0</p>
      <p id="timer-display">⏱ 30s</p>
    </div>
  </div>
  <div id="game-area">
    <div id="coin-layer"></div>
  </div>
  <div id="miner-panel">
    <div id="miners-display"></div>
    <div id="buttons-row">
      <button class="shop-btn" id="buy-miner-btn">
        <img id="miner-btn-img" src="" alt="+Miner" draggable="false">
        <span class="cost">🪙20</span>
      </button>
      <div id="miner-info">⛏️ 0/10</div>
      <button class="shop-btn" id="buy-speed-btn">
        <img id="speed-btn-img" src="" alt="x2 Speed" draggable="false">
        <span class="cost">🪙60</span>
      </button>
    </div>
  </div>
</div>

<!-- Persistent Download Button (visible on start & gameplay, hidden on game over) -->
<button id="persistent-download-btn" onclick="exitToStore()"><img id="persistent-download-btn-img" src="" alt="Download" draggable="false"></button>

<!-- Tap to Start -->
<div id="tap-to-start">
  <h1>BITCOIN DROPS</h1>
  <p>TAP TO START</p>
</div>

<!-- Game Over — NO restart button, only Download CTA -->
<div id="game-over">
  <div id="game-over-inner">
    <h1>GAME OVER</h1>
    <p id="game-over-msg">Time's up!</p>
    <button id="download-btn" onclick="exitToStore()"><img id="download-btn-img" src="" alt="Download" draggable="false"></button>
  </div>
</div>

/* ═══════════════════════════════════════════════════════════
   BACKGROUND — Procedural sky + hills via Canvas
   Redraws on resize/orientation change
   ═══════════════════════════════════════════════════════════ */
var bgCanvas=document.getElementById('bg-canvas');
var bgCtx=bgCanvas.getContext('2d');

var GROUND_PX=0;
function getFloorHeight(){return 0}
function getFloorY(){return window.innerHeight}

function drawBackground(){
  var W=window.innerWidth,H=window.innerHeight;
  bgCanvas.width=W;bgCanvas.height=H;

  /* Sky gradient — fills entire screen */
  var skyGrad=bgCtx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0,'#4AB3F4');
  skyGrad.addColorStop(0.5,'#7ECFF5');
  skyGrad.addColorStop(1,'#B8E4FA');
  bgCtx.fillStyle=skyGrad;
  bgCtx.fillRect(0,0,W,H);

  /* Clouds */
  bgCtx.fillStyle='rgba(255,255,255,0.85)';
  drawCloud(W*0.15,H*0.12,W*0.12);
  drawCloud(W*0.55,H*0.08,W*0.15);
  drawCloud(W*0.80,H*0.18,W*0.10);

  /* No ground — sky fills entire screen */
}

function drawCloud(cx,cy,size){
  bgCtx.beginPath();
  bgCtx.arc(cx,cy,size*0.5,0,Math.PI*2);
  bgCtx.arc(cx-size*0.35,cy+size*0.1,size*0.35,0,Math.PI*2);
  bgCtx.arc(cx+size*0.4,cy+size*0.1,size*0.38,0,Math.PI*2);
  bgCtx.arc(cx+size*0.15,cy-size*0.2,size*0.3,0,Math.PI*2);
  bgCtx.fill();
}

function drawHillRow(W,H,baseY,hillSize,count){
  bgCtx.beginPath();
  bgCtx.moveTo(0,H);
  var step=W/(count-0.5);
  for(var i=0;i<count;i++){
    var cx=step*i+step*0.5;
    bgCtx.quadraticCurveTo(cx,baseY-hillSize,cx+step*0.5,baseY);
  }
  bgCtx.lineTo(W,H);
  bgCtx.closePath();
  bgCtx.fill();
}

drawBackground();
window.addEventListener('resize',drawBackground);
window.addEventListener('orientationchange',function(){setTimeout(drawBackground,150)});

/* ═══════════════════════════════════════════════════════════
   GAME ENGINE
   ═══════════════════════════════════════════════════════════ */
var $q=function(s){return document.querySelector(s)};
var coinLayer=$q('#coin-layer');
var activeCountEl=$q('#active-count');
var scoreEl=$q('#score-display');
var buyMinerBtn=$q('#buy-miner-btn');
var buySpeedBtn=$q('#buy-speed-btn');
var minerInfoEl=$q('#miner-info');
var minersDisplay=$q('#miners-display');
var gameOverEl=$q('#game-over');
var tapOverlay=$q('#tap-to-start');

var CAP=25,BASE_INTERVAL=500,ROCK_R=48,GROUND_HEIGHT=0;
var MINER_COST=20,SPEED_COST=60,MAX_MINERS=10;
var GRAVITY=0.45,RESTITUTION=0.35,FRICTION=0.95;
var GAME_DURATION=30;

var coins=[],score=0,minerCount=0,minerLevel=1,speedMult=1,nextId=0;
var gameOver=false,gamePaused=false,gameStarted=false;
var spawnTimer=null,minerTimer=null,rafId=0;
var timeLeft=GAME_DURATION,countdownTimer=null;

var W=window.innerWidth,H=window.innerHeight;
var ROCK_D=ROCK_R*2;

function recalcDimensions(){
  W=window.innerWidth;H=window.innerHeight;
}

function pauseGame(){gamePaused=true;clearInterval(spawnTimer);clearInterval(minerTimer)}
function resumeGame(){gamePaused=false;startSpawner();startMinerIncome();rafId=requestAnimationFrame(physics)}

/* ── Tap to Start ── */
tapOverlay.addEventListener('click',function(){
  tapOverlay.classList.add('hidden');
  gameStarted=true;
  recalcDimensions();
  startSpawner();
  startCountdown();
  rafId=requestAnimationFrame(physics);
});

function startCountdown(){
  timeLeft=GAME_DURATION;
  updateTimerDisplay();
  countdownTimer=setInterval(function(){
    if(gameOver||gamePaused)return;
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft<=0){
      clearInterval(countdownTimer);
      triggerGameOver("Time's up!");
    }
  },1000);
}
function updateTimerDisplay(){
  var el=$q('#timer-display');
  if(el){el.textContent='⏱ '+timeLeft+'s';el.style.color=timeLeft<=5?'hsl(0,85%,50%)':'hsl(0,85%,60%)';}
}
function triggerGameOver(msg){
  gameOver=true;
  clearInterval(spawnTimer);clearInterval(minerTimer);clearInterval(countdownTimer);
  var msgEl=$q('#game-over-msg');
  if(msgEl)msgEl.textContent=msg||"Time's up!";
  var persistBtn=document.getElementById('persistent-download-btn');
  if(persistBtn)persistBtn.classList.add('hidden');
  gameOverEl.classList.add('active');
}

/* ── Spawn ── */
function spawnCoin(){
  if(gameOver||gamePaused)return;
  recalcDimensions();
  var id='c'+(nextId++);
  var x=ROCK_R+Math.random()*(W-ROCK_D);
  var coin={id:id,x:x,y:-ROCK_R,vx:(Math.random()-0.5)*2,vy:0,removing:false,el:null};
  var div=document.createElement('div');
  div.className='coin';
  div.style.width=div.style.height=ROCK_D+'px';
  div.innerHTML='<img src="'+COIN_IMAGE+'" alt="coin" draggable="false">';
  div.addEventListener('click',function(){clickCoin(coin)});
  div.addEventListener('touchstart',function(e){e.preventDefault();clickCoin(coin)},{passive:false});
  coinLayer.appendChild(div);
  coin.el=div;coins.push(coin);
}

function clickCoin(coin){
  if(gameOver||coin.removing)return;
  score++;coin.removing=true;
  coin.el.classList.add('removing');
  setTimeout(function(){removeCoin(coin)},300);
  updateUI();
}

function removeCoin(coin){
  coins=coins.filter(function(c){return c.id!==coin.id});
  if(coin.el&&coin.el.parentNode)coin.el.parentNode.removeChild(coin.el);
}

/* ── Physics ── */
function physics(){
  if(gameOver||gamePaused)return;
  recalcDimensions();
  var floorY=window.innerHeight;
  for(var i=0;i<coins.length;i++){
    var c=coins[i];
    if(c.removing)continue;
    c.vy+=GRAVITY;c.x+=c.vx;c.y+=c.vy;
    if(c.y+ROCK_R>=floorY){c.y=floorY-ROCK_R;c.vy*=-RESTITUTION;c.vx*=FRICTION;if(Math.abs(c.vy)<0.5)c.vy=0;}
    if(c.x<ROCK_R){c.x=ROCK_R;c.vx*=-RESTITUTION;}
    if(c.x>W-ROCK_R){c.x=W-ROCK_R;c.vx*=-RESTITUTION;}
    c.el.style.left=(c.x-ROCK_R)+'px';
    c.el.style.top=(c.y-ROCK_R)+'px';
    c.el.style.width=c.el.style.height=ROCK_D+'px';
  }
  /* Coin-coin collisions */
  var active=coins.filter(function(c){return!c.removing});
  for(var i=0;i<active.length;i++){
    for(var j=i+1;j<active.length;j++){
      var a=active[i],b=active[j];
      var dx=b.x-a.x,dy=b.y-a.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<ROCK_D&&dist>0){
        var nx=dx/dist,ny=dy/dist;
        var overlap=(ROCK_D-dist)/2;
        a.x-=nx*overlap;a.y-=ny*overlap;
        b.x+=nx*overlap;b.y+=ny*overlap;
        var dvx=a.vx-b.vx,dvy=a.vy-b.vy;
        var dot=dvx*nx+dvy*ny;
        if(dot>0){
          a.vx-=dot*nx*RESTITUTION;a.vy-=dot*ny*RESTITUTION;
          b.vx+=dot*nx*RESTITUTION;b.vy+=dot*ny*RESTITUTION;
        }
      }
    }
  }
  if(active.length>CAP){triggerGameOver('Too many coins!')}
  updateUI();rafId=requestAnimationFrame(physics);
}

/* ── UI ── */
function updateUI(){
  var active=coins.filter(function(c){return!c.removing}).length;
  activeCountEl.textContent=active;
  activeCountEl.className=active>CAP-3?'danger':'';
  scoreEl.textContent='Score: '+score;
  buyMinerBtn.disabled=score<MINER_COST;
  buySpeedBtn.disabled=score<SPEED_COST;
  var info='⛏️ '+minerCount+'/'+MAX_MINERS;
  if(minerLevel>1)info+=' Lv.'+minerLevel;
  minerInfoEl.textContent=info;
  minersDisplay.innerHTML='';
  for(var i=0;i<minerCount;i++){
    var s=document.createElement('span');
    s.className='miner-icon';s.textContent='⛏️';
    s.style.animationDelay=(i*0.15)+'s';
    minersDisplay.appendChild(s);
  }
}

function startSpawner(){clearInterval(spawnTimer);spawnTimer=setInterval(spawnCoin,BASE_INTERVAL/speedMult)}
function startMinerIncome(){
  clearInterval(minerTimer);if(minerCount===0)return;
  minerTimer=setInterval(function(){
    if(gameOver||gamePaused)return;
    score+=minerCount*minerLevel;updateUI();
  },2000);
}

buyMinerBtn.addEventListener('click',function(){
  if(score<MINER_COST)return;score-=MINER_COST;
  if(minerCount<MAX_MINERS){minerCount++;}else{minerLevel*=2;minerCount=0;}
  updateUI();startMinerIncome();
});
buySpeedBtn.addEventListener('click',function(){
  if(score<SPEED_COST)return;score-=SPEED_COST;
  speedMult*=2;updateUI();startSpawner();
});

/* ── Platform callbacks ── */
try{if(typeof FbPlayableAd!=='undefined'&&FbPlayableAd.onReady){FbPlayableAd.onReady()}}catch(e){}
updateUI();
</script>
